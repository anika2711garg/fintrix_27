services:
  - type: web
    name: fintrix
    env: node
    plan: free
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRE
        value: 24h
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_API_URL
        sync: false
